server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 20m;

    location /rest/v1/ {
        proxy_pass http://postgrest:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header apikey $http_apikey;
    }

    location /events {
        proxy_pass http://events:3100/events;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
    }

    location = /api/vm-sync {
        proxy_pass https://flowerbox.md/crm-price-sync.php;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Host flowerbox.md;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-CRM-Sync-Token $http_x_crm_sync_token;
        proxy_set_header Content-Type $http_content_type;
    }

    location = /api/vm-sync-cookie {
        proxy_pass https://flowerbox.md/crm-price-sync.php;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Host flowerbox.md;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-CRM-Sync-Token $cookie_vm_sync_token;
        proxy_set_header Content-Type application/json;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
