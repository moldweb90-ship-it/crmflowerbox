services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: flowerbox
      POSTGRES_USER: flowerbox
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGRST_DB_PASSWORD: ${PGRST_DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sh:/docker-entrypoint-initdb.d/001-flowerbox.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowerbox -d flowerbox"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgrest:
    image: postgrest/postgrest:v12.2.8
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://authenticator:${PGRST_DB_PASSWORD}@db:5432/flowerbox
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${PGRST_JWT_SECRET}
      PGRST_SERVER_PORT: 3000

  events:
    build:
      context: ..
      dockerfile: deploy/events/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://flowerbox:${POSTGRES_PASSWORD}@db:5432/flowerbox
      PORT: 3100
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}

  crm:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
        VITE_LOCAL_ADMIN_PASSWORD: ${VITE_LOCAL_ADMIN_PASSWORD}
        VITE_VM_SYNC_ENDPOINT: ${VITE_VM_SYNC_ENDPOINT:-}
        VITE_INLINE_EMPLOYEE_PHOTOS: "true"
    restart: unless-stopped
    depends_on:
      - postgrest
      - events
    environment:
      CRM_SYNC_TOKEN: ${CRM_SYNC_TOKEN}
    ports:
      - "80:80"

volumes:
  postgres_data:
